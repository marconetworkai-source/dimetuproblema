<script type="text/babel">
/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const S = '"Instrument Serif", Georgia, serif';
const INITIAL_COUNT = 324; // mínimo visible; la API lo reemplaza con el dato real

/* ══════════════════════════════════════════════
   HOOKS
══════════════════════════════════════════════ */
function useMobile(bp = 768) {
  const [m, setM] = React.useState(() => window.innerWidth < bp);
  React.useEffect(() => {
    const mq = window.matchMedia(`(max-width:${bp-1}px)`);
    const fn = e => setM(e.matches);
    mq.addEventListener('change', fn); setM(mq.matches);
    return () => mq.removeEventListener('change', fn);
  }, [bp]);
  return m;
}

function useReveal(ref, threshold = 0.12) {
  React.useEffect(() => {
    if (!ref.current) return;
    const els = ref.current.querySelectorAll('.reveal, .reveal-scale');
    if (!els.length) return;
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useInView(ref, threshold = 0.15) {
  const [seen, setSeen] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setSeen(true); obs.disconnect(); } }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return seen;
}

function useCount(target, dur, active) {
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    if (!active) return;
    const t0 = performance.now();
    let id;
    const tick = now => {
      const p = Math.min(1, (now - t0) / dur);
      setN(Math.round((1 - Math.pow(1 - p, 3)) * target));
      if (p < 1) id = requestAnimationFrame(tick);
    };
    id = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(id);
  }, [active, target]);
  return n;
}

/* 3D scroll stack */
React.useEffect && (() => {})(); // no-op placeholder

/* ══════════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════════ */
function ParticleField({ density=.00010, speed=.16, maxLink=100, color='#ffffff', linkOpacity=.08, particleOpacity=.45 }) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio||1, 2);
    let W=0, H=0, pts=[], raf, mouse={x:-9999,y:-9999,on:false};
    const resize = () => {
      const r = c.getBoundingClientRect();
      W=Math.max(1,r.width|0); H=Math.max(1,r.height|0);
      c.width=W*dpr; c.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0);
      const n=Math.max(20,Math.min(160,Math.round(W*H*density)));
      pts=Array.from({length:n},()=>{const a=Math.random()*Math.PI*2,s=(.4+Math.random()*.6)*speed;return{x:Math.random()*W,y:Math.random()*H,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:.5+Math.random()*1};});
    };
    const tick = () => {
      ctx.clearRect(0,0,W,H);
      for(const p of pts){
        if(mouse.on){const dx=p.x-mouse.x,dy=p.y-mouse.y,d2=dx*dx+dy*dy;if(d2<12000){const f=(1-d2/12000)*.4;p.vx+=(dx/Math.sqrt(d2+1))*f*.08;p.vy+=(dy/Math.sqrt(d2+1))*f*.08;}}
        p.x+=p.vx; p.y+=p.vy; p.vx*=.994; p.vy*=.994;
        p.vx+=(Math.random()-.5)*.014; p.vy+=(Math.random()-.5)*.014;
        const sp=Math.hypot(p.vx,p.vy); if(sp<speed*.25){const a=Math.random()*Math.PI*2;p.vx=Math.cos(a)*speed*.25;p.vy=Math.sin(a)*speed*.25;}
        if(p.x<-4)p.x=W+4; if(p.x>W+4)p.x=-4; if(p.y<-4)p.y=H+4; if(p.y>H+4)p.y=-4;
      }
      ctx.strokeStyle=color;
      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d<maxLink){ctx.globalAlpha=(1-d/maxLink)*linkOpacity;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
      ctx.fillStyle=color;
      for(const p of pts){ctx.globalAlpha=particleOpacity;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1; raf=requestAnimationFrame(tick);
    };
    const ro=new ResizeObserver(resize); ro.observe(c); resize(); tick();
    const par=c.parentElement;
    const mm=e=>{const r=c.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;mouse.on=true;};
    const ml=()=>{mouse.on=false;};
    par.addEventListener('mousemove',mm); par.addEventListener('mouseleave',ml);
    return()=>{cancelAnimationFrame(raf);ro.disconnect();par.removeEventListener('mousemove',mm);par.removeEventListener('mouseleave',ml);};
  },[density,speed,maxLink,color,linkOpacity,particleOpacity]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}/>;
}

/* ══════════════════════════════════════════════
   DOT PROGRESS
══════════════════════════════════════════════ */
function DotProgress({ count, cols=50, bucketSize=10, dotSize=8, gap=4 }) {
  const total=10000, buckets=Math.ceil(total/bucketSize), filled=Math.floor(count/bucketSize), partial=(count%bucketSize)/bucketSize;
  const rows=Math.ceil(buckets/cols), w=cols*(dotSize+gap)-gap, h=rows*(dotSize+gap)-gap;
  const dots=[];
  for(let i=0;i<buckets;i++){
    let fill,opacity;
    if(i<filled){fill='#D63228';opacity=1;}
    else if(i===filled){fill='#D63228';opacity=.35+partial*.65;}
    else{fill='rgba(255,255,255,.15)';opacity=1;}
    dots.push(<rect key={i} x={(i%cols)*(dotSize+gap)} y={Math.floor(i/cols)*(dotSize+gap)} width={dotSize} height={dotSize} rx={dotSize*.25} fill={fill} opacity={opacity} style={{animationDelay:`${Math.min((i*3)%900,900)}ms`}} className="animate-dotIn"/>);
  }
  return <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{display:'block'}} preserveAspectRatio="xMidYMid meet">{dots}</svg>;
}

/* ══════════════════════════════════════════════
   NAV
══════════════════════════════════════════════ */
function Nav({ isM }) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', fn, {passive:true});
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const go = id => { const el=document.getElementById(id); if(el)el.scrollIntoView({behavior:'smooth'}); };
  return (
    <nav className="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
      style={{
        background: scrolled ? 'rgba(8,8,14,.82)' : 'transparent',
        backdropFilter: scrolled ? 'blur(20px) saturate(180%)' : 'none',
        WebkitBackdropFilter: scrolled ? 'blur(20px) saturate(180%)' : 'none',
        borderBottom: scrolled ? '1px solid rgba(255,255,255,.08)' : '1px solid transparent',
      }}>
      <div className="flex items-center justify-between px-5 md:px-14 py-4 md:py-5">
        {/* Logo — glass on scroll */}
        <button onClick={() => window.scrollTo({top:0,behavior:'smooth'})} style={{background:'none',border:'none',cursor:'pointer',padding:0}}>
          <div className={`flex items-baseline gap-1.5 px-3 py-1.5 rounded-full transition-all duration-300 ${scrolled ? 'glass' : ''}`}>
            <span style={{fontFamily:S, fontStyle:'italic', fontSize: isM?20:24, color:'#f8f8fc', lineHeight:1}}>dime</span>
            <span style={{fontFamily:'JetBrains Mono', fontSize:10, color:'rgba(248,248,252,.4)', lineHeight:1}}>·</span>
            <span style={{fontFamily:S, fontSize: isM?20:24, color:'#f8f8fc', lineHeight:1}}>tu problema</span>
          </div>
        </button>
        {!isM && (
          <div className="flex gap-8" style={{fontFamily:'JetBrains Mono',fontSize:11,letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(248,248,252,.55)'}}>
            {[['movimiento','El movimiento'],['contador','Contador'],['formulario','Participa'],['faq','FAQ']].map(([id,label])=>(
              <span key={id} onClick={()=>go(id)} className="cursor-pointer hover:text-white transition-colors duration-200">{label}</span>
            ))}
          </div>
        )}
        <button onClick={()=>go('formulario')}
          className="glass-btn rounded-full text-white font-medium"
          style={{fontFamily:'inherit',fontSize:isM?12:13,padding:isM?'9px 18px':'11px 24px',background:'rgba(214,50,40,.85)',border:'1px solid rgba(214,50,40,.5)',backdropFilter:'blur(8px)'}}>
          Sumar mi voz
        </button>
      </div>
    </nav>
  );
}

/* ══════════════════════════════════════════════
   HOW IT WORKS
══════════════════════════════════════════════ */
function HowItWorks({ isM }) {
  const ref = React.useRef(null);
  const [hovered, setHovered] = React.useState(1);
  const [stacked, setStacked] = React.useState(false);
  useReveal(ref);

  const phases = [
    { n:'01', meta:'Fase 01 · escucha', title:'Habla.', italic:'Sin filtros.', body:'No hace falta ser experto ni tener solución. Cuéntanos qué te quita el sueño, qué no funciona, qué te parece injusto. Eso es todo.', stat:'3 minutos', sub:'es suficiente' },
    { n:'02', meta:'Fase 02 · análisis', title:'Escuchamos.', italic:'A 10.000 personas.', body:'Con suficientes voces reales, la IA identifica el problema que afecta a más gente y tiene solución posible. No somos nosotros: son los datos de la ciudadanía.', stat:'10.000', sub:'voces necesarias' },
    { n:'03', meta:'Fase 03 · construcción', title:'Se construye.', italic:'Para todos.', body:'Desarrollamos la app de forma abierta y la entregamos libre, gratuita y sin condiciones. Ni suscripciones, ni anuncios, ni letra pequeña. Jamás.', stat:'Gratis.', sub:'siempre' },
  ];

  return (
    <section id="movimiento" ref={ref} className="section-card relative overflow-visible"
      style={{background:'#F8F8FC', paddingTop:isM?'5rem':'9rem', paddingBottom:isM?'5rem':'10rem', paddingLeft:isM?'1.375rem':'3.5rem', paddingRight:isM?'1.375rem':'3.5rem'}}>

const SECTORS = ['Sanidad y salud','Educación','Vivienda y alquiler','Trabajo y empleo','Transporte y movilidad','Seguridad y justicia','Medio ambiente','Burocracia y administración','Economía personal','Familia y cuidados','Soledad y comunidad','Otro'];

const RRSS = ['Instagram','TikTok','Twitter / X','Facebook','YouTube','LinkedIn'];

function FormSection({ isM }) {
  const ref = React.useRef(null);
  useReveal(ref);
  const [step, setStep] = React.useState(0);
  const [done, setDone] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const [apiError, setApiError] = React.useState('');
  const [fd, setFd] = React.useState({nombre:'',email:'',sector:'',sectorOtro:'',descripcion:'',solucion:'',precio:'',pais:'',provincia:'',ciudadLibre:'',enterado:[],enteradoRrss:[],enteradoOtroText:''});
  const set = (k,v) => setFd(d=>({...d,[k]:v}));
  const toggleArr = (k,v) => setFd(d=>({...d,[k]:d[k].includes(v)?d[k].filter(x=>x!==v):[...d[k],v]}));
  const next = () => setStep(s=>Math.min(3,s+1));
  const prev = () => setStep(s=>Math.max(0,s-1));

  const emailValid = v => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim());

  const handleSubmit = async () => {
    setSubmitting(true); setApiError('');
    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre: fd.nombre, email: fd.email,
          sector: fd.sector, sectorOtro: fd.sectorOtro,
          descripcion: fd.descripcion, solucion: fd.solucion,
          precio: fd.precio, pais: fd.pais,
          ciudadProvincia: fd.pais === 'España' ? fd.provincia : fd.ciudadLibre,
          enterado: fd.enterado, enteradoRrss: fd.enteradoRrss,
          enteradoOtroText: fd.enteradoOtroText,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error desconocido');
      setDone(true);
    } catch (err) {
      setApiError(err.message);
    } finally {
      setSubmitting(false);
    }
  };

  const steps = [{n:'01',label:'Tú'},{n:'02',label:'El problema'},{n:'03',label:'La solución'},{n:'04',label:'Contexto'}];

  const inputCls = "form-input";
  const labelCls = "form-label";

  const stepContent = [
    /* Step 0 */
    <div key={0} className="flex flex-col gap-5">
      <div><label className={labelCls}>Nombre o apodo</label>
        <input value={fd.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Como quieras que te llamemos" className={inputCls}/></div>
      <div><label className={labelCls}>Email</label>
        <input type="email" value={fd.email} onChange={e=>set('email',e.target.value)} placeholder="tu@email.com" className={inputCls}/></div>
      <button onClick={next} disabled={!fd.nombre.trim()||!emailValid(fd.email)}
        style={{marginTop:8,background:(!fd.nombre.trim()||!emailValid(fd.email))?'rgba(214,50,40,.35)':'#D63228',color:'#fff',border:'none',borderRadius:999,padding:'15px 28px',fontSize:15,fontWeight:600,cursor:(!fd.nombre.trim()||!emailValid(fd.email))?'not-allowed':'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:10,justifyContent:'center'}}>
        Siguiente <span style={{fontFamily:'JetBrains Mono',fontSize:13,opacity:.8}}>→</span>
      </button>
    </div>,

    /* Step 1 */
    <div key={1} className="flex flex-col gap-5">
      <div>
        <label className={labelCls}>Sector del problema</label>
        <select value={fd.sector} onChange={e=>set('sector',e.target.value)} className={inputCls} style={{cursor:'pointer'}}>
          <option value="">Elige el sector…</option>
          {SECTORS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        {fd.sector==='Otro' && <input value={fd.sectorOtro} onChange={e=>set('sectorOtro',e.target.value)} placeholder="Describe el sector…" className={inputCls} style={{marginTop:10}}/>}
      </div>
      <div>
        <label className={labelCls}>Describe tu problema</label>
        <textarea value={fd.descripcion} onChange={e=>set('descripcion',e.target.value)} placeholder="Cuéntanoslo como se lo contarías a un amigo…" maxLength={600}
          className={inputCls} style={{minHeight:160, resize:'none', lineHeight:1.55}}/>
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:6,fontFamily:'JetBrains Mono',fontSize:10,letterSpacing:'.1em',textTransform:'uppercase',color:'rgba(248,248,252,.3)'}}>
          {fd.descripcion.length}/600
        </div>
      </div>
      <div className="flex gap-3 flex-col-reverse sm:flex-row">
        <button onClick={prev} style={{flex:'0 0 auto',background:'rgba(255,255,255,.08)',color:'rgba(248,248,252,.8)',border:'1px solid rgba(255,255,255,.12)',borderRadius:999,padding:'14px 22px',fontSize:14,cursor:'pointer'}}>← Atrás</button>
        {fd.descripcion.length > 0 && fd.descripcion.length < 50 && (
          <div style={{fontFamily:'JetBrains Mono',fontSize:10,letterSpacing:'.08em',textTransform:'uppercase',color:'rgba(214,50,40,.7)',textAlign:'right'}}>
            Mínimo 50 caracteres ({50 - fd.descripcion.length} restantes)
          </div>
        )}
        <button onClick={next} disabled={!fd.sector||(fd.sector==='Otro'&&!fd.sectorOtro.trim())||fd.descripcion.length<50}
          style={{flex:1,background:(!fd.sector||(fd.sector==='Otro'&&!fd.sectorOtro.trim())||fd.descripcion.length<50)?'rgba(214,50,40,.35)':'#D63228',color:'#fff',border:'none',borderRadius:999,padding:'15px 28px',fontSize:15,fontWeight:600,cursor:(!fd.sector||(fd.sector==='Otro'&&!fd.sectorOtro.trim())||fd.descripcion.length<50)?'not-allowed':'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:10,justifyContent:'center'}}>
          Siguiente <span style={{fontFamily:'JetBrains Mono',fontSize:13,opacity:.8}}>→</span>
        </button>
      </div>
    </div>,

    /* Step 2 */
    <div key={2} className="flex flex-col gap-5">
      <div>
        <label className={labelCls}>¿Cómo lo resolverías tú?</label>
        <textarea value={fd.solucion} onChange={e=>set('solucion',e.target.value)} placeholder="No tiene que ser técnico. Una intuición basta…" maxLength={400}
          className={inputCls} style={{minHeight:130, resize:'none', lineHeight:1.55}}/>
      </div>
      <div>
        <label className={labelCls}>¿Cuánto pagarías por la solución?</label>
        <div className="flex flex-col gap-2">
          {PRICES.map(p=>(
            <button key={p} onClick={()=>set('precio',p)}
              style={{background:fd.precio===p?'rgba(214,50,40,.25)':'rgba(255,255,255,.05)',border:`1px solid ${fd.precio===p?'rgba(214,50,40,.6)':'rgba(255,255,255,.1)'}`,borderRadius:12,padding:'12px 18px',color:'rgba(248,248,252,.85)',fontSize:14,cursor:'pointer',textAlign:'left',transition:'all .2s'}}>
              {p}
            </button>
          ))}
        </div>
      </div>
      <div className="flex gap-3 flex-col-reverse sm:flex-row">
        <button onClick={prev} style={{flex:'0 0 auto',background:'rgba(255,255,255,.08)',color:'rgba(248,248,252,.8)',border:'1px solid rgba(255,255,255,.12)',borderRadius:999,padding:'14px 22px',fontSize:14,cursor:'pointer'}}>← Atrás</button>
        <button onClick={next}
          style={{flex:1,background:'#D63228',color:'#fff',border:'none',borderRadius:999,padding:'15px 28px',fontSize:15,fontWeight:600,cursor:'pointer',transition:'all .2s',display:'flex',alignItems:'center',gap:10,justifyContent:'center'}}>
          Siguiente <span style={{fontFamily:'JetBrains Mono',fontSize:13,opacity:.8}}>→</span>
        </button>
      </div>
    </div>,

    /* Step 3 */
    <div key={3} className="flex flex-col gap-5">
      <div>
        <label className={labelCls}>País</label>
        <select value={fd.pais} onChange={e=>{set('pais',e.target.value);set('provincia','');set('ciudadLibre','');}} className={inputCls} style={{cursor:'pointer'}}>
          <option value="">Selecciona tu país…</option>
          {COUNTRIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div>
        <label className={labelCls}>{fd.pais==='España'?'Provincia':'Ciudad o región'}</label>
        {fd.pais==='España' ? (
          <select value={fd.provincia} onChange={e=>set('provincia',e.target.value)} className={inputCls} style={{cursor:'pointer'}}>
            <option value="">Selecciona provincia…</option>
            {PROVINCIAS.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        ) : (
          <input value={fd.ciudadLibre} onChange={e=>set('ciudadLibre',e.target.value)} placeholder="Tu ciudad o región" className={inputCls}/>
        )}
      </div>
      <div>
        <label className={labelCls}>¿Cómo te has enterado?</label>
        <div className="flex flex-col gap-2">
          {['Redes sociales','Boca a boca','Búsqueda por internet','Otro'].map(opt=>(
            <div key={opt}>
              <button onClick={()=>toggleArr('enterado',opt)}
                style={{width:'100%',background:fd.enterado.includes(opt)?'rgba(214,50,40,.2)':'rgba(255,255,255,.05)',border:`1px solid ${fd.enterado.includes(opt)?'rgba(214,50,40,.5)':'rgba(255,255,255,.1)'}`,borderRadius:12,padding:'12px 18px',color:'rgba(248,248,252,.85)',fontSize:14,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:10,transition:'all .2s'}}>
                <span style={{width:16,height:16,borderRadius:4,border:`2px solid ${fd.enterado.includes(opt)?'#D63228':'rgba(255,255,255,.3)'}`,background:fd.enterado.includes(opt)?'#D63228':'transparent',display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>
                  {fd.enterado.includes(opt)&&<span style={{color:'#fff',fontSize:10,fontWeight:700}}>✓</span>}
                </span>
                {opt}
              </button>
              {opt==='Redes sociales' && fd.enterado.includes('Redes sociales') && (
                <div className="mt-2 ml-4 flex flex-col gap-1.5">

/* ══════════════════════════════════════════════
   SCROLL STACK 3D EFFECT
══════════════════════════════════════════════ */
function useScrollStack() {
  React.useEffect(() => {
    const cards = document.querySelectorAll('.section-card');
    const update = () => {
      cards.forEach((card, i) => {
        if (i === cards.length - 1) return;
        const rect = card.getBoundingClientRect();
        const progress = Math.max(0, Math.min(1, -rect.top / (rect.height * 0.5)));
        if (progress > 0) {
          card.style.transform = `scale(${1 - progress * 0.03}) translateY(${-progress * 18}px)`;
          card.style.filter = `brightness(${1 - progress * 0.12})`;
        } else {
          card.style.transform = '';
          card.style.filter = '';
        }
      });
    };
    window.addEventListener('scroll', update, { passive: true });
    update();
    return () => window.removeEventListener('scroll', update);
  }, []);
}

   APP
══════════════════════════════════════════════ */
function App() {
  const isM = useMobile();
  const [liveCount, setLiveCount] = React.useState(INITIAL_COUNT);
  useScrollStack();

  // Obtiene el contador real de Airtable y lo refresca cada 60 s
  React.useEffect(() => {
    const fetchCount = async () => {
      try {
        const r = await fetch('/api/count');
        if (r.ok) { const d = await r.json(); if (typeof d.count === 'number') setLiveCount(d.count); }
      } catch { /* en local sin servidor mantiene INITIAL_COUNT */ }
    };
    fetchCount();
    const t = setInterval(fetchCount, 60_000);
    return () => clearInterval(t);
  }, []);

  return (
    <>
      <Nav isM={isM}/>
      <Hero isM={isM} liveCount={liveCount}/>
      <HowItWorks isM={isM}/>
      <CounterSection isM={isM} liveCount={liveCount}/>

      <FormSection isM={isM}/>
      <FAQSection isM={isM}/>
      <Footer isM={isM} liveCount={liveCount}/>
    </>
  );
}
